name: Atualizar CICLO CSV

on:
  workflow_dispatch:

jobs:
  atualizar-ciclo-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install gspread google-auth google-api-python-client

      - name: Gerar credenciais.json a partir do Secret Base64
        shell: bash
        run: |
          printf "%s" "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 --decode > credenciais.json

      - name: Executar ciclo_CSV.py
        run: |
          python ciclo_CSV.py
